<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyABvBLrB9KBCJV1YS-8t3SJrqHUfPqB-7LMo",
  authDomain: "replyshastra.firebaseapp.com",
  projectId: "replyshastra",
  storageBucket: "replyshastra.appspot.com",
  messagingSenderId: "346754998835",
  appId: "1:346754998835:web:ecca09c1bb98a5f9a7f946"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

provider.setCustomParameters({
  prompt: "select_account"
});

const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

document.getElementById("loginBtn").onclick = async () => {
  try {
    if (isMobile) {
      await signInWithRedirect(auth, provider);
    } else {
      const result = await signInWithPopup(auth, provider);
      if (result.user) {
        window.location.href = "app.html";
      }
    }
  } catch (error) {
    console.log(error);
    alert(error.message);
  }
};

// Handle redirect result (for mobile)
getRedirectResult(auth).then((result) => {
  if (result && result.user) {
    window.location.href = "app.html";
  }
});

// Already logged in
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "app.html";
  }
});
</script>
