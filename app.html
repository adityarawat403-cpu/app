<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReplyShastra AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b2cff">
<link rel="icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
}

body{
background:#050008;
color:white;
height:100vh;
overflow:hidden;
}

.header{
position:fixed;
top:0;
left:0;
right:0;
height:65px;
display:flex;
align-items:center;
gap:12px;
padding:0 15px;
background:rgba(0,0,0,.55);
z-index:60;
backdrop-filter:blur(10px);
}

.menuBtn{
font-size:26px;
cursor:pointer;
}

.logo img{
width:34px;
border-radius:10px;
}

.username{
margin-left:auto;
font-size:13px;
opacity:.8;
}

.sideMenu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#140021;
padding:20px 25px;
transition:.35s;
z-index:100;
overflow:auto;
}

.sideMenu a{
display:block;
margin:18px 0;
font-size:17px;
text-decoration:none;
color:white;
}

.userBlock{
margin-top:60px;
padding-bottom:15px;
border-bottom:1px solid rgba(255,255,255,.1);
}

.userName{
font-size:18px;
font-weight:600;
}

.userPlan{
font-size:13px;
opacity:.7;
}

.installBtnMenu{
margin-top:25px;
padding:14px;
text-align:center;
background:linear-gradient(135deg,#7b2cff,#b067ff);
border-radius:12px;
font-weight:600;
font-size:16px;
}

.installBtnMenu a{
color:white;
text-decoration:none;
}

#menuOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:55;
}

.chatbox{
position:fixed;
top:65px;
bottom:78px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
background:url("weapon-bg.png") center/cover no-repeat;
}

.msg{
max-width:78%;
padding:12px 15px;
border-radius:18px;
font-size:15px;
line-height:1.5;
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#7b2cff,#b067ff);
}

.bot{
align-self:flex-start;
background:#1b1b24;
border:1px solid rgba(255,255,255,.1);
}

.copyBtn{
margin-top:8px;
font-size:12px;
opacity:.7;
cursor:pointer;
background:rgba(255,255,255,0.1);
border:none;
color:white;
padding:4px 10px;
border-radius:8px;
display:inline-block;
}

.typing{
display:flex;
gap:4px;
padding:10px 14px;
background:#1b1b24;
border-radius:18px;
width:60px;
align-self:flex-start;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}

.inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:10px;
padding:12px;
background:rgba(0,0,0,.65);
backdrop-filter:blur(10px);
}

input{
flex:1;
padding:14px;
border-radius:14px;
border:none;
background:#0e0e14;
color:white;
font-size:15px;
font-family:'Quicksand',sans-serif;
}

input::placeholder{
color:rgba(255,255,255,0.4);
}

input:focus{
outline:1px solid rgba(123,44,255,0.5);
}

.sendBtn{
padding:12px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#c0c0c0,#ffffff);
color:black;
font-weight:600;
cursor:pointer;
font-family:'Quicksand',sans-serif;
}

.sendBtn:disabled{
opacity:0.5;
cursor:not-allowed;
}

.installPopup{
position:fixed;
bottom:-120px;
left:0;
right:0;
background:#140021;
padding:16px;
display:flex;
align-items:center;
justify-content:space-between;
transition:.4s;
z-index:200;
box-shadow:0 -10px 30px rgba(0,0,0,.6);
}

.installPopup.show{bottom:0;}

.installPopup button{
border:none;
padding:8px 14px;
border-radius:8px;
background:#7b2cff;
color:white;
cursor:pointer;
}

.installPopup .later{background:#444;}

/* Limit warning */
.limitWarn{
text-align:center;
font-size:13px;
opacity:0.6;
padding:8px;
}

</style>
</head>
<body>

<!-- ===== SIDE MENU ===== -->
<div id="menu" class="sideMenu">
  <div class="userBlock">
    <div id="menuName" class="userName">User</div>
    <div class="userPlan">Free Plan \u2022 <span id="menuReplies"></span> replies left</div>
  </div>
  <a href="#">Subscription</a>
  <a href="#" onclick="shareApp()">Share App</a>
  <a href="about.html">About</a>
  <a href="privacy.html">Privacy</a>
  <a href="terms.html">Terms</a>
  <div class="installBtnMenu">
    <a href="#" onclick="installApp()">\u2b07 Download App</a>
  </div>
  <hr style="opacity:.2;margin:25px 0;">
  <a href="#" onclick="logout()">Logout</a>
</div>

<div id="menuOverlay"></div>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="menuBtn" onclick="toggleMenu()">\u2630</div>
  <div class="logo"><img src="icon.png"></div>
  <div>ReplyShastra</div>
  <div id="username" class="username"></div>
</div>

<!-- ===== CHAT ===== -->
<div id="chat" class="chatbox"></div>

<!-- ===== INPUT ===== -->
<div class="inputArea">
  <input id="text" placeholder="Apni situation batao... (e.g. girlfriend gussa hai, kya reply karu?)">
  <button class="sendBtn" id="sendBtn" onclick="send()">Send</button>
</div>

<!-- ===== INSTALL POPUP ===== -->
<div id="installPopup" class="installPopup">
  <span>Install ReplyShastra for faster access</span>
  <div>
    <button onclick="installApp()">Install</button>
    <button class="later" onclick="closeInstall()">Later</button>
  </div>
</div>

<!-- ===== AUDIO ===== -->
<audio id="sendSound" src="send.mp3"></audio>
<audio id="replySound" src="reply.mp3"></audio>
<audio id="typingSound" src="typing.mp3"></audio>
