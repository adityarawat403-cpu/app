<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>ReplyShastra Login</title><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet"><style>

body{
background:#0a0015;
font-family:'Quicksand';
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
margin:0;
}

.card{
background:#140021;
padding:35px;
border-radius:18px;
width:320px;
text-align:center;
box-shadow:0 0 25px #7b2cff55;
}

.logo{
width:70px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:none;
background:#0d0d14;
color:white;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#7b2cff,#b067ff);
color:white;
font-weight:600;
cursor:pointer;
}

</style></head><body><div class="card"><img src="icon.png" class="logo"><h2>ReplyShastra</h2><p>AI Relationship Coach</p><div id="phoneBox"><input id="phone" placeholder="Phone Number"><button onclick="sendOTP()">Send OTP</button>

</div><div id="otpBox" style="display:none"><input id="otp" placeholder="Enter OTP"><button onclick="verifyOTP()">Verify</button>

</div><div id="nameBox" style="display:none"><input id="name" placeholder="Your Name"><button onclick="finish()">Continue</button>

</div></div><script>

function sendOTP(){

document.getElementById("phoneBox").style.display="none"
document.getElementById("otpBox").style.display="block"

}

function verifyOTP(){

document.getElementById("otpBox").style.display="none"
document.getElementById("nameBox").style.display="block"

}

function finish(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

localStorage.setItem("rs_user",phone)
localStorage.setItem("rs_name",name)

window.location="app.html"

}

</script></body>
</html>
