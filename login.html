<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReplyShastra Login</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0a0015;
font-family:'Quicksand';
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
margin:0;
}

.card{
background:#140021;
padding:40px;
border-radius:18px;
width:320px;
text-align:center;
box-shadow:0 0 25px #7b2cff55;
}

h2{
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:none;
background:#0d0d14;
color:white;
outline:none;
}

button{
margin-top:18px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#7b2cff,#b067ff);
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.small{
margin-top:14px;
font-size:14px;
opacity:.7;
}

</style>
</head>

<body>

<div class="card">

<h2>ReplyShastra</h2>
<p>AI Relationship Reply Generator</p>

<input id="email" placeholder="Email">

<input id="password" placeholder="Password" type="password">

<button onclick="login()">Login</button>

<div class="small">New user? Create account soon</div>

</div>

<script>

function login(){

let email=document.getElementById("email").value.trim()
let pass=document.getElementById("password").value.trim()

if(email=="" || pass==""){
alert("Please enter email and password")
return
}

localStorage.setItem("rs_user",email)

window.location="intro.html"

}

</script>

</body>
</html>
