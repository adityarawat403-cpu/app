<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>ReplyShastra Login</title><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet"><style>

*{
box-sizing:border-box;
}

body{
background:#0a0015;
font-family:'Quicksand';
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:white;
margin:0;
padding:15px;
}

/* CARD */

.card{
background:#140021;
padding:35px 25px;
border-radius:20px;
width:100%;
max-width:340px;
text-align:center;
box-shadow:0 0 35px rgba(123,44,255,0.45);
transition:0.3s;
}

.card:hover{
box-shadow:0 0 45px rgba(123,44,255,0.7);
}

/* LOGO */

.logo{
width:75px;
margin-bottom:12px;
}

/* INPUT */

input{
width:100%;
padding:13px;
margin-top:12px;
border-radius:12px;
border:none;
background:#0d0d14;
color:white;
font-size:15px;
outline:none;
}

/* BUTTON */

button{
margin-top:15px;
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#7b2cff,#b067ff);
color:white;
font-weight:600;
cursor:pointer;
font-size:15px;
transition:0.25s;
}

button:hover{
box-shadow:0 0 18px #7b2cff;
transform:scale(1.02);
}

/* SECOND BUTTON */

.secondary{
background:#1b1b24;
}

.secondary:hover{
box-shadow:0 0 12px #444;
}

/* OR */

.or{
margin:16px 0;
opacity:.6;
font-size:13px;
}

</style></head><body><div class="card"><img src="icon.png" class="logo"><h2>ReplyShastra</h2><p>AI Relationship Coach</p><!-- LOGIN --><div id="loginBox"><input id="username" placeholder="Username"><input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button>

<button class="secondary" onclick="showCreate()">Create Account</button>

</div><!-- CREATE ACCOUNT --><div id="createBox" style="display:none"><button onclick="phoneSignup()">Signup with Phone</button>

<button onclick="emailSignup()">Signup with Email</button>

<button onclick="googleSignup()">Signup with Google</button>

<div class="or">Already have account?</div><button class="secondary" onclick="showLogin()">Back to Login</button>

</div></div><script>

/* LOGIN */

function login(){

let user=document.getElementById("username").value

if(!user){

alert("Enter username")

return

}

localStorage.setItem("rs_user",user)

window.location="app.html"

}

/* SWITCH SCREENS */

function showCreate(){

document.getElementById("loginBox").style.display="none"

document.getElementById("createBox").style.display="block"

}

function showLogin(){

document.getElementById("loginBox").style.display="block"

document.getElementById("createBox").style.display="none"

}

/* SIGNUP OPTIONS */

function phoneSignup(){

alert("Phone signup coming soon")

}

function emailSignup(){

alert("Email signup coming soon")

}

function googleSignup(){

alert("Google signup coming soon")

}

</script></body></html>
